backend:
  name: github
  repo: heyhardie/my-blog
  branch: main
  auth_type: pkce
  app_id: Ov23liDQevBAVsn6RB7l

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Categories", name: "categories", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "about.markdown"
        fields:
          - {label: "Title", name: "title", widget: "hidden", default: "About"}
          - {label: "Body", name: "body", widget: "markdown"}
      - label: "Projects"
        name: "projects"
        file: "projects.md"
        fields:
          - {label: "Title", name: "title", widget: "hidden", default: "Projects"}
          - {label: "Body", name: "body", widget: "markdown"}
